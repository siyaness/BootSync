<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootSync 프론트 빌드 필요</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: #f7f6f3;
            color: #1e2a3a;
        }
        .shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: min(640px, 100%);
            background: #fdfcfb;
            border: 1px solid #e2e4df;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(30, 42, 58, 0.08);
            padding: 32px;
        }
        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }
        p {
            margin: 0 0 14px;
            line-height: 1.6;
            color: #4a5568;
        }
        pre {
            margin: 18px 0 0;
            padding: 16px;
            border-radius: 14px;
            background: #1e2a3a;
            color: #e8f4f6;
            overflow-x: auto;
            font-size: 13px;
        }
        code {
            font-family: Consolas, "Courier New", monospace;
        }
    </style>
</head>
<body>
<main class="shell">
    <section class="card">
        <h1>BootSync 최신 프론트 빌드가 필요합니다.</h1>
        <p>현재 프로젝트는 React 기반 <code>/app</code> 화면만 사용합니다.</p>
        <p><code>frontend/dist</code>가 아직 없어서 화면을 열 수 없습니다. 아래 순서로 프론트를 한 번 빌드한 뒤 서버를 다시 실행해 주세요.</p>
        <pre><code>cd .\frontend
$env:VITE_BASE_PATH='/app/'
npm run build

cd ..
.\gradlew.bat bootRunTestProfile</code></pre>
    </section>
</main>
</body>
</html>
