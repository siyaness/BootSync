services:
  mysql:
    image: mysql:8.4
    container_name: bootsync-mysql
    restart: unless-stopped
    environment:
      # Local development defaults only. Do not reuse these credentials in prod.
      MYSQL_DATABASE: bootsync
      MYSQL_USER: bootsync
      MYSQL_PASSWORD: bootsync
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build:
      context: .
    container_name: bootsync-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: local
      # Local development defaults only. Replace with real secrets outside local runs.
      DB_URL: jdbc:mysql://mysql:3306/bootsync?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: bootsync
      DB_PASSWORD: bootsync
      APP_TIMEZONE: Asia/Seoul
      SESSION_COOKIE_NAME: BOOTSYNCSESSION
      # Demo seed account for local/test profiles only. Never reuse in prod/public environments.
      BOOTSYNC_DEMO_USERNAME: d
      BOOTSYNC_DEMO_PASSWORD: d
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  mysql-data:
