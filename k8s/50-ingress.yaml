apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bootsync-ingress
  namespace: bootsync
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: bootsync.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bootsync-service
                port:
                  number: 80
