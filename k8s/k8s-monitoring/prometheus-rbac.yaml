apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: bootsync-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: bootsync-monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bootsync-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: bootsync-monitoring
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
      - namespaces
    verbs:
      - get
      - list
      - watch
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bootsync-prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: bootsync-monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bootsync-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: bootsync-monitoring
