apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: bootsync-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: bootsync-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: bootsync-monitoring
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-scrape-secret
              mountPath: /etc/prometheus/secrets/bootsync-prometheus-token
              subPath: bootsync-prometheus-token
              readOnly: true
            - name: prometheus-data
              mountPath: /prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-scrape-secret
          secret:
            secretName: prometheus-scrape-secret
        - name: prometheus-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: bootsync-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: bootsync-monitoring
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
  type: ClusterIP
